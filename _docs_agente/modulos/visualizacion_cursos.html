<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modelo ER: Cursos (LMS) - Interactivo</title>
    <!-- Tailwind (Utility) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bootstrap (Requested framework) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Vis.js -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
      #mynetwork {
        width: 100%;
        height: 700px;
        background-color: #ffffff;
        border: 1px solid #dee2e6;
        border-radius: 0.375rem;
      }
      .card-header-custom {
        background-color: #f8f9fa;
        border-bottom: 1px solid #dee2e6;
      }
    </style>
  </head>
  <body class="bg-light p-4 font-sans">
    <div class="container-fluid">
      <!-- Top Section: Header & Details -->
      <div class="row mb-4">
        <div class="col-12">
          <div class="card shadow-sm">
            <div class="card-body">
              <div class="row align-items-center">
                <div class="col-md-4">
                  <h1 class="h3 text-primary fw-bold mb-1">Modelo: Cursos (LMS)</h1>
                  <p class="text-secondary small mb-0">Arquitectura de Entidades y Relaciones</p>
                </div>
                <div class="col-md-8">
                  <div id="detail-panel" class="p-3 bg-white border rounded">
                    <div id="node-info">
                      <p class="text-muted fst-italic mb-0">
                        <i class="bi bi-info-circle"></i> Haz clic en un nodo del diagrama para ver su descripción.
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Main Graph Area -->
      <div class="row">
        <div class="col-12">
          <div class="card shadow-sm">
            <div class="card-body p-0">
              <div id="mynetwork"></div>
            </div>
            <!-- Legend Footer -->
            <div class="card-footer bg-white">
              <div class="d-flex flex-wrap gap-3 small text-secondary justify-content-center">
                <div class="d-flex align-items-center gap-1">
                  <span
                    class="d-inline-block rounded-circle"
                    style="width: 12px; height: 12px; background-color: #dbeafe; border: 1px solid #2563eb"></span>
                  Model
                </div>
                <div class="d-flex align-items-center gap-1">
                  <span
                    class="d-inline-block rounded-circle"
                    style="width: 12px; height: 12px; background-color: #f3e8ff; border: 1px solid #9333ea"></span>
                  Pivot
                </div>
                <div class="d-flex align-items-center gap-1">
                  <span
                    class="d-inline-block rounded-circle"
                    style="width: 12px; height: 12px; background-color: #fef3c7; border: 1px solid #d97706"></span>
                  Config
                </div>
                <div class="d-flex align-items-center gap-1">
                  <span
                    class="d-inline-block rounded-circle"
                    style="width: 12px; height: 12px; background-color: #d1fae5; border: 1px solid #059669"></span>
                  Logic
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="text/javascript">
      // --- Data Definition ---
      const rootData = [
        {
          id: 'curso',
          name: 'Curso',
          type: 'model',
          desc: 'Entidad Raíz. Configura el contenido, precio y acceso.',
          children: [
            {
              id: 'configuracion',
              name: 'Configuración',
              type: 'config',
              desc: 'Estado, Dificultad, Obligatoriedad.',
              children: [{ id: 'precios', name: 'Precios', type: 'config', desc: 'Moneda, Costo, Gratuito.' }]
            },
            {
              id: 'restricciones',
              name: 'Restricciones de Acceso',
              type: 'logic',
              desc: 'Reglas para poder ver/inscribirse.',
              children: [
                { id: 'roles', name: 'Roles Permitidos', type: 'pivot', desc: 'Tabla: curso_roles_restriccion' },
                { id: 'pagos', name: 'Tipos de Pago', type: 'pivot', desc: 'Tabla: curso_tipos_pago' },
                {
                  id: 'pasos_req',
                  name: 'Pasos Requisito',
                  type: 'pivot',
                  desc: 'Tabla: curso_paso_requisito. Requiere estado específico.'
                },
                {
                  id: 'tareas_req',
                  name: 'Tareas Requisito',
                  type: 'pivot',
                  desc: 'Tabla: curso_tarea_requisito. Requiere tarea completada.'
                }
              ]
            },
            {
              id: 'efectos',
              name: 'Efectos y Automatización',
              type: 'logic',
              desc: 'Acciones disparadas por el progreso.',
              children: [
                {
                  id: 'pasos_ini',
                  name: 'Iniciar Pasos',
                  type: 'pivot',
                  desc: 'Tabla: curso_paso_iniciar. Al comenzar el curso.'
                },
                {
                  id: 'pasos_cul',
                  name: 'Culminar Pasos',
                  type: 'pivot',
                  desc: 'Tabla: curso_paso_culminar. Al finalizar el curso.'
                },
                {
                  id: 'tareas_cul',
                  name: 'Culminar Tareas',
                  type: 'pivot',
                  desc: 'Tabla: curso_tarea_culminar. Al finalizar el curso.'
                }
              ]
            },
            {
              id: 'code',
              name: 'Código & Livewire',
              type: 'code',
              desc: 'Implementación Técnica.',
              children: [
                { id: 'controller', name: 'CursoController', type: 'code', desc: 'Rutas Web.' },
                { id: 'lw_gestionar', name: 'GestionarCursos', type: 'code', desc: 'Listado y Filtros.' },
                { id: 'lw_crear', name: 'CrearCurso', type: 'code', desc: 'Formulario y Lógica de Guardado.' }
              ]
            },
            {
              id: 'foro',
              name: 'Foro de Dudas',
              type: 'logic',
              desc: 'Módulo de comunidad e interacciones.',
              children: [
                { id: 'foro_hilos', name: 'curso_foro_hilos', type: 'model', desc: 'Hilos/Preguntas del curso.' },
                {
                  id: 'foro_respuestas',
                  name: 'curso_foro_respuestas',
                  type: 'model',
                  desc: 'Respuestas a los hilos.'
                },
                {
                  id: 'foro_estudiante',
                  name: 'ForoCursoEstudiante',
                  type: 'code',
                  desc: 'Livewire: Panel de estudiante.'
                },
                {
                  id: 'foro_asesor',
                  name: 'PanelForoAsesor',
                  type: 'code',
                  desc: 'Livewire: Panel Administrativo/Asesor.'
                }
              ]
            }
          ]
        }
      ];

      // --- Node Styles ---
      function getNodeOptions(type) {
        const base = { shape: 'box', margin: 10, font: { multi: 'html', size: 16 } };
        switch (type) {
          case 'model':
            return {
              ...base,
              color: { background: '#DBEafe', border: '#2563eb' },
              font: { color: '#1e3a8a', multi: 'html' }
            };
          case 'pivot':
            return {
              ...base,
              color: { background: '#F3E8FF', border: '#9333ea' },
              font: { color: '#581c87', multi: 'html' }
            };
          case 'config':
            return {
              ...base,
              color: { background: '#FEF3C7', border: '#d97706' },
              font: { color: '#78350f', multi: 'html' }
            };
          case 'logic':
            return {
              ...base,
              color: { background: '#D1FAE5', border: '#059669' },
              font: { color: '#064e3b', multi: 'html' }
            };
          case 'code':
            return {
              ...base,
              color: { background: '#F1F5F9', border: '#475569' },
              font: { color: '#334155', multi: 'html' }
            };
          default:
            return { ...base, color: { background: '#ffffff', border: '#cccccc' }, font: { multi: 'html' } };
        }
      }

      // --- Process Nodes ---
      const nodesArray = [];
      const edgesArray = [];

      function processNode(node, parentId = null) {
        const nodeId = node.id || Math.random().toString(36).substr(2, 9);
        const options = getNodeOptions(node.type);

        nodesArray.push({
          id: nodeId,
          label: `<b>${node.name}</b>\n<i>${node.type}</i>`,
          ...options,
          _desc: node.desc,
          _type: node.type,
          _name: node.name
        });

        if (parentId) {
          edgesArray.push({ from: parentId, to: nodeId, arrows: 'to', color: { color: '#cbd5e1' } });
        }

        if (node.children && node.children.length > 0) {
          node.children.forEach(child => processNode(child, nodeId));
        }
      }

      rootData.forEach(root => processNode(root));

      // --- Init Network ---
      const container = document.getElementById('mynetwork');
      const data = { nodes: new vis.DataSet(nodesArray), edges: new vis.DataSet(edgesArray) };
      const options = {
        layout: { hierarchical: { direction: 'UD', sortMethod: 'directed', nodeSpacing: 200, levelSeparation: 150 } },
        physics: false,
        interaction: { hover: true, zoomView: true }
      };
      const network = new vis.Network(container, data, options);

      // --- Interaction ---
      const infoContainer = document.getElementById('node-info');
      network.on('click', function (params) {
        if (params.nodes.length > 0) {
          const nodeId = params.nodes[0];
          const clickedNode = nodesArray.find(n => n.id === nodeId);
          if (clickedNode) renderDetail(clickedNode);
        }
      });

      function renderDetail(nodeData) {
        const typeBadges = {
          model: 'bg-primary',
          pivot: 'bg-info text-dark',
          config: 'bg-warning text-dark',
          logic: 'bg-success',
          code: 'bg-secondary'
        };
        const badgeClass = typeBadges[nodeData._type] || 'bg-light text-dark border';

        infoContainer.innerHTML = `
            <div class="fade-in">
                <div class="d-flex align-items-center gap-2 mb-2">
                    <span class="badge ${badgeClass}">${nodeData._type}</span>
                    <span class="font-monospace text-muted small ms-auto">${nodeData.id}</span>
                </div>
                <h4 class="text-dark fw-bold mb-2">${nodeData._name}</h4>
                <p class="mb-0 text-secondary border-start border-4 border-primary ps-3 bg-light py-2 rounded-end">
                    ${nodeData._desc}
                </p>
            </div>
        `;
      }
    </script>
  </body>
</html>
