<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modelo ER: Escuelas - Interactivo</title>
    <!-- Tailwind (Utility) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bootstrap (Requested framework) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Vis.js -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
      #mynetwork {
        width: 100%;
        height: 700px; /* Taller height since it's full width now */
        background-color: #ffffff;
        border: 1px solid #dee2e6; /* Bootstrap border color */
        border-radius: 0.375rem;
      }
      /* Custom override to make Tailwind and Bootstrap play nice if needed,
         but for this simple page, standard Bootstrap classes on containers work well. */
      .card-header-custom {
        background-color: #f8f9fa;
        border-bottom: 1px solid #dee2e6;
      }
    </style>
  </head>
  <body class="bg-light p-4 font-sans">
    <div class="container-fluid">
      <!-- Top Section: Header & Details (Full Width) -->
      <div class="row mb-4">
        <div class="col-12">
          <div class="card shadow-sm">
            <div class="card-body">
              <div class="row align-items-center">
                <div class="col-md-4">
                  <h1 class="h3 text-primary fw-bold mb-1">Modelo: Escuelas</h1>
                  <p class="text-secondary small mb-0">Arquitectura de Entidades y Relaciones</p>
                </div>
                <div class="col-md-8">
                  <!-- Detail Panel integrated into header area for better usage of space -->
                  <div id="detail-panel" class="p-3 bg-white border rounded">
                    <div id="node-info">
                      <p class="text-muted fst-italic mb-0">
                        <i class="bi bi-info-circle"></i> Haz clic en un nodo del diagrama para ver su descripción y
                        detalles aquí.
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Main Graph Area (Full Width) -->
      <div class="row">
        <div class="col-12">
          <div class="card shadow-sm">
            <div class="card-body p-0">
              <div id="mynetwork"></div>
            </div>
            <!-- Legend Footer -->
            <div class="card-footer bg-white">
              <div class="d-flex flex-wrap gap-3 small text-secondary justify-content-center">
                <div class="d-flex align-items-center gap-1">
                  <span
                    class="d-inline-block rounded-circle"
                    style="width: 12px; height: 12px; background-color: #dbeafe; border: 1px solid #2563eb"></span>
                  Model
                </div>
                <div class="d-flex align-items-center gap-1">
                  <span
                    class="d-inline-block rounded-circle"
                    style="width: 12px; height: 12px; background-color: #f3e8ff; border: 1px solid #9333ea"></span>
                  Pivot
                </div>
                <div class="d-flex align-items-center gap-1">
                  <span
                    class="d-inline-block rounded-circle"
                    style="width: 12px; height: 12px; background-color: #fee2e2; border: 1px solid #dc2626"></span>
                  Critical
                </div>
                <div class="d-flex align-items-center gap-1">
                  <span
                    class="d-inline-block rounded-circle"
                    style="width: 12px; height: 12px; background-color: #fef3c7; border: 1px solid #d97706"></span>
                  Config
                </div>
                <div class="d-flex align-items-center gap-1">
                  <span
                    class="d-inline-block rounded-circle"
                    style="width: 12px; height: 12px; background-color: #d1fae5; border: 1px solid #059669"></span>
                  Logic
                </div>
                <div class="d-flex align-items-center gap-1">
                  <span
                    class="d-inline-block rounded-circle"
                    style="width: 12px; height: 12px; background-color: #f1f5f9; border: 1px solid #475569"></span>
                  Code
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="text/javascript">
      // --- Data Definition ---
      const rootData = [
        {
          id: 'escuela',
          name: 'Escuela',
          type: 'model',
          desc: 'Entidad Raíz. Configura la oferta general.',
          children: [
            {
              id: 'periodo',
              name: 'Periodo',
              type: 'model',
              desc: 'Ciclo Académico (Ej: 2024-1, Semestre A). Define fechas límite.',
              children: [
                {
                  id: 'materia-periodo',
                  name: 'MateriaPeriodo',
                  type: 'pivot',
                  desc: 'Oferta de una materia en este periodo específico.',
                  children: [
                    {
                      id: 'horario',
                      name: 'HorarioMateriaPeriodo',
                      type: 'model',
                      desc: 'La "Clase" real. Vincula Materia + Aula + Maestro + Horario.',
                      children: [
                        {
                          id: 'matricula',
                          name: 'Matrícula (Pivot User)',
                          type: 'critical',
                          desc: 'Conexión con el Alumno. Maneja Pagos y Estado Académico.',
                          children: [
                            {
                              id: 'pago',
                              name: 'Estado de Pago',
                              type: 'field',
                              desc: 'Control financiero de la inscripción.'
                            },
                            {
                              id: 'traslados',
                              name: 'Log de Traslados',
                              type: 'relation',
                              desc: 'Historial de cambios de grupo.'
                            }
                          ]
                        },
                        {
                          id: 'asistencia',
                          name: 'ReporteAsistenciaClase',
                          type: 'model',
                          desc: 'Cabecera de asistencia por fecha.',
                          children: [
                            {
                              id: 'detalle-asistencia',
                              name: 'ReporteAsistenciaAlumnos',
                              type: 'detail',
                              desc: 'Detalle por alumno (Asistió/No).'
                            }
                          ]
                        }
                      ]
                    },
                    {
                      id: 'cortes',
                      name: 'CortePeriodo',
                      type: 'config',
                      desc: 'Configuración de pesos evaluativos para este periodo.'
                    }
                  ]
                }
              ]
            },
            {
              id: 'materia',
              name: 'Materia',
              type: 'model',
              desc: 'Catálogo de asignaturas. Define plan de estudios.',
              children: [
                {
                  id: 'item-plantilla',
                  name: 'ItemPlantilla',
                  type: 'config',
                  desc: 'Plantilla de evaluación (Ej: "Parcial 1 - 30%").',
                  children: [
                    {
                      id: 'item-instancia',
                      name: 'ItemCorteMateriaPeriodo',
                      type: 'instance',
                      desc: 'Instancia viva del ítem en un periodo.',
                      children: [
                        {
                          id: 'respuesta',
                          name: 'AlumnoRespuestaItem',
                          type: 'critical',
                          desc: 'Nota y evidencia del alumno.'
                        }
                      ]
                    }
                  ]
                },
                {
                  id: 'requisitos',
                  name: 'Prerrequisitos',
                  type: 'logic',
                  desc: 'Validaciones de entrada (Otras materias, Procesos, Tareas).'
                },
                {
                  id: 'efectos',
                  name: 'Efectos de Aprobación',
                  type: 'logic',
                  desc: 'Automatizaciones al aprobar (Cerrar Tareas Consolidación, Avanzar Pasos).'
                }
              ]
            },
            {
              id: 'controllers',
              name: 'Controladores',
              type: 'code',
              desc: 'Capa Lógica y Livewire Components.',
              children: [
                {
                  id: 'escuela-controller',
                  name: 'EscuelaController',
                  type: 'code',
                  desc: 'Panel Gatekeeper & CRUD.'
                },
                {
                  id: 'horarios-lw',
                  name: 'Livewire/Horarios',
                  type: 'code',
                  desc: 'Gestor de cupos y horarios base.'
                }
              ]
            }
          ]
        }
      ];

      // --- Node Styles ---
      function getNodeOptions(type) {
        // Use 'multi: "html"' to support <b>, <i>, etc. correctly
        const base = { shape: 'box', margin: 10, font: { multi: 'html', size: 16 } };
        switch (type) {
          case 'model':
            return {
              ...base,
              color: { background: '#DBEafe', border: '#2563eb' },
              font: { color: '#1e3a8a', multi: 'html' }
            };
          case 'pivot':
            return {
              ...base,
              color: { background: '#F3E8FF', border: '#9333ea' },
              font: { color: '#581c87', multi: 'html' }
            };
          case 'critical':
            return {
              ...base,
              color: { background: '#FEE2E2', border: '#dc2626' },
              font: { color: '#7f1d1d', multi: 'html' }
            };
          case 'code':
            return {
              ...base,
              color: { background: '#F1F5F9', border: '#475569' },
              font: { color: '#334155', multi: 'html' }
            };
          case 'config':
            return {
              ...base,
              color: { background: '#FEF3C7', border: '#d97706' },
              font: { color: '#78350f', multi: 'html' }
            };
          case 'logic':
            return {
              ...base,
              color: { background: '#D1FAE5', border: '#059669' },
              font: { color: '#064e3b', multi: 'html' }
            };
          default:
            return { ...base, color: { background: '#ffffff', border: '#cccccc' }, font: { multi: 'html' } };
        }
      }

      // --- Process Nodes ---
      const nodesArray = [];
      const edgesArray = [];
      const nodeMap = new Map();

      function processNode(node, parentId = null) {
        const nodeId = node.id || Math.random().toString(36).substr(2, 9);
        const options = getNodeOptions(node.type);

        // FIX: Replaced unsupported <span size="12"> with standard <i> tag
        // Vis.js 'html' mode supports <b>, <i>, <code>.
        nodesArray.push({
          id: nodeId,
          label: `<b>${node.name}</b>\n<i>${node.type}</i>`,
          ...options,
          _desc: node.desc,
          _type: node.type,
          _name: node.name
        });
        nodeMap.set(nodeId, node);

        if (parentId) {
          edgesArray.push({ from: parentId, to: nodeId, arrows: 'to', color: { color: '#cbd5e1' } });
        }

        if (node.children && node.children.length > 0) {
          node.children.forEach(child => processNode(child, nodeId));
        }
      }

      rootData.forEach(root => processNode(root));

      // --- Init Network ---
      const container = document.getElementById('mynetwork');
      const data = {
        nodes: new vis.DataSet(nodesArray),
        edges: new vis.DataSet(edgesArray)
      };

      const options = {
        layout: {
          hierarchical: {
            direction: 'UD',
            sortMethod: 'directed',
            nodeSpacing: 250,
            levelSeparation: 150
          }
        },
        physics: false,
        interaction: {
          hover: true,
          zoomView: true
        }
      };

      const network = new vis.Network(container, data, options);

      // --- Interaction ---
      const infoContainer = document.getElementById('node-info');

      network.on('click', function (params) {
        if (params.nodes.length > 0) {
          const nodeId = params.nodes[0];
          const clickedNode = nodesArray.find(n => n.id === nodeId);

          if (clickedNode) {
            renderDetail(clickedNode);
          }
        }
      });

      function renderDetail(nodeData) {
        // Bootstrap badge classes
        const typeBadges = {
          model: 'bg-primary',
          pivot: 'bg-info text-dark',
          critical: 'bg-danger',
          config: 'bg-warning text-dark',
          logic: 'bg-success',
          code: 'bg-secondary',
          detail: 'bg-light text-dark border'
        };

        const badgeClass = typeBadges[nodeData._type] || 'bg-light text-dark border';

        infoContainer.innerHTML = `
            <div class="fade-in">
                <div class="d-flex align-items-center gap-2 mb-2">
                    <span class="badge ${badgeClass}">${nodeData._type}</span>
                    <span class="font-monospace text-muted small ms-auto">${nodeData.id}</span>
                </div>
                <h4 class="text-dark fw-bold mb-2">${nodeData._name}</h4>
                <p class="mb-0 text-secondary border-start border-4 border-primary ps-3 bg-light py-2 rounded-end">
                    ${nodeData._desc}
                </p>
            </div>
        `;
      }
    </script>
  </body>
</html>
